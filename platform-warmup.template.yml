name: Platform Warmup

on:
  schedule:
    - cron: '31 7 * * *'  # stagger so platforms don't collide; UTC
  workflow_dispatch:

jobs:
  platform-warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # MUST exceed GLOBAL_DEADLINE minutes in the orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: node src/platformWarmup.js
        env:
          GL_API_TOKEN: ${{ secrets.GL_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_MENTION_USER_ID: ${{ secrets.SLACK_MENTION_USER_ID }}

      - name: Upload Platform warmup logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-warmup-logs
          path: logs/*.json
          if-no-files-found: ignore
